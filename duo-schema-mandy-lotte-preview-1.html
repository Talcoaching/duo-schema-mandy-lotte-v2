<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schema Mandy & Lotte - tal&coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2D4A3E;--cream:#FDFBF3;--gold:#C97B1A;--teal:#2A7A8C;--muted:#6b7c76;--border:#ddd8cc;--white:#fff;--rose:#9B4F6A;--up:#27ae60;--dn:#e74c3c}
body{background:var(--cream);font-family:'Nunito',sans-serif;font-size:14px;color:var(--green);min-height:100vh}

/* LOGIN */
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#loginScreen.show{display:flex}
.lcard{background:var(--white);border-radius:20px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden}
.lcard-top{background:var(--green);padding:26px 28px 22px;position:relative}
.lcard-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--teal))}
.lcard-logo{height:22px;filter:brightness(0) invert(1)}
.lcard-body{padding:28px}
.lcard-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:var(--green);margin-bottom:6px}
.lcard-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.lcard-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--green);outline:none;background:var(--cream);margin-bottom:12px}
.lcard-input:focus{border-color:var(--teal);background:#fff}
.lcard-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.lcard-msg{margin-top:12px;font-size:13px;font-weight:600;min-height:18px;text-align:center}
.lcard-msg.success{color:var(--teal)}.lcard-msg.error{color:var(--dn)}

/* APP */
#appScreen{display:none}
#appScreen.show{display:block}
.header{background:var(--green);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--teal))}
.header-logo{height:18px;filter:brightness(0) invert(1)}
.header-right{display:flex;align-items:center;gap:10px}
.client-select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer;outline:none}
.client-select option{background:var(--green);color:#fff}
.sync-status{font-size:10px;font-weight:700;color:rgba(255,255,255,.4)}

.day-toggle{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;position:sticky;top:51px;z-index:100}
.day-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:var(--cream);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.day-btn .day-label{display:block;font-size:9px;font-weight:400;opacity:.7;margin-top:2px}

.week-nav{background:var(--white);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:99px;z-index:99}
.week-nav::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;padding:4px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--cream);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.week-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.week-btn.has-data{border-color:var(--teal);color:var(--teal)}

.container{max-width:720px;margin:0 auto;padding:14px 13px 100px}
.week-meta{margin-bottom:12px;padding:0 4px}
.week-label{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900}
.week-label span{font-style:italic;color:var(--gold)}
.rir-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:4px;background:#edf2f0;color:var(--green)}

.warmup-card{background:var(--green);border-radius:12px;padding:12px 15px;margin-bottom:12px}
.warmup-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.warmup-text{font-size:13px;color:rgba(255,255,255,.8);line-height:1.6}

.exercise{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.exercise.lotte-alt{border-color:var(--rose);border-width:1.5px}
.ex-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.ex-name{font-weight:700;font-size:14px;color:var(--green);flex:1}
.ex-tag{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:2px}
.tag-compound{background:#edf2f0;color:var(--green)}
.tag-isolation{background:#fdf6ec;color:var(--gold)}
.tag-core{background:#eef7f9;color:var(--teal)}
.tag-upper{background:#f0edf8;color:#6c3483}
.ex-client-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;background:#fce8ef;color:var(--rose);flex-shrink:0;margin-top:2px}
.ex-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.badge-reps{background:#fce8ef;color:var(--rose)}
.badge-rir{background:#eef7f9;color:var(--teal)}
.ex-note{font-size:11px;color:var(--teal);font-style:italic;padding:5px 8px;background:#eef7f9;border-radius:6px;margin-bottom:7px;line-height:1.5}
.ex-note.lotte{background:#fce8ef;color:var(--rose)}

.set-hdr{display:grid;grid-template-columns:20px 1fr 1fr 1fr 44px;gap:4px;margin-bottom:3px}
.set-row{display:grid;grid-template-columns:20px 1fr 1fr 1fr 44px;gap:4px;align-items:center;margin-bottom:3px}
.col-hdr{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);text-align:center}
.set-num{font-size:11px;color:var(--muted);font-weight:700;text-align:center}
input[type="text"]{width:100%;background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:5px 3px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);text-align:center;outline:none}
input[type="text"]:focus{border-color:var(--teal);background:#fff}
input::placeholder{color:#ccc;font-size:10px}

.vol-bar{margin-top:6px;padding:6px 9px;background:var(--cream);border-radius:8px;border:1px solid var(--border)}
.vol-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.vol-num{font-size:11px;font-weight:700}
.vol-diff{font-size:11px;font-weight:700}
.vol-track{height:3px;background:var(--border);border-radius:4px;overflow:hidden}
.vol-fill{height:100%;border-radius:4px;transition:width .3s}

.notes-block{background:#fafaf7;border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:10px}
.notes-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);outline:none;resize:none;height:48px}
textarea:focus{border-color:var(--teal)}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:100}
.btn-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.save-msg{font-size:12px;color:var(--teal);font-weight:700;display:none;min-width:80px}
.add-ex-btn{width:100%;background:var(--cream);border:1.5px dashed var(--border);border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;margin-bottom:10px;text-align:center}
.add-ex-btn:hover{border-color:var(--teal);color:var(--teal)}
.custom-exercise{background:var(--white);border:1.5px dashed var(--gold);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.custom-ex-name{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--green);background:var(--cream);outline:none;margin-bottom:8px}
.custom-ex-name:focus{border-color:var(--teal);background:#fff}
.custom-ex-meta{display:flex;gap:8px;margin-bottom:8px}
.custom-ex-meta input{flex:1;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);background:var(--cream);outline:none;text-align:center}
.custom-ex-meta input:focus{border-color:var(--teal);background:#fff}
.custom-ex-label{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);display:block;text-align:center;margin-top:3px}
.remove-ex-btn{font-size:11px;color:var(--dn);font-weight:700;background:none;border:none;cursor:pointer;padding:2px 0;font-family:'Nunito',sans-serif}
</style>
</head>

function fKey(c,w,di,ei,s,t){return `duo_${c}_w${w}_d${di}_e${ei}_s${s}_${t}`;}
function nKey(c,w,di){return `duo_${c}_w${w}_d${di}_notes`;}

async function sbUpsert(row){
  try{
    await fetch(SUPABASE_URL+'/rest/v1/duo_sessions',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(row)
    });
  }catch(e){console.warn('sync failed',e);}
}

async function sbLoad(c,w,di){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/duo_sessions?client=eq.${c}&week=eq.${w}&day=eq.${di}`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const rows=await r.json();
    if(Array.isArray(rows)) rows.forEach(row=>{
      if(row.weight) localStorage.setItem(fKey(c,w,di,row.exercise,row.set_num,'w'),row.weight);
      if(row.reps)   localStorage.setItem(fKey(c,w,di,row.exercise,row.set_num,'r'),row.reps);
      if(row.rir)    localStorage.setItem(fKey(c,w,di,row.exercise,row.set_num,'rir'),row.rir);
      if(row.notes)  localStorage.setItem(nKey(c,w,di),row.notes);
    });
  }catch(e){console.warn('load failed',e);}
}

function getVol(w,di,ei){
  const ex=SCHEMA[di].exercises[ei];
  let t=0;
  for(let s=0;s<ex.sets;s++){
    const wv=parseFloat(localStorage.getItem(fKey(CLIENT,w,di,ei,s,'w')))||0;
    const rv=parseFloat(localStorage.getItem(fKey(CLIENT,w,di,ei,s,'r')))||0;
    t+=wv*rv;
  }
  return Math.round(t);
}

function getPrev(w,di,ei){
  for(let pw=w-1;pw>=1;pw--){const v=getVol(pw,di,ei);if(v>0) return {vol:v,week:pw};}
  return null;
}

function volHTML(di,ei){
  const cur=getVol(CW,di,ei);
  const prev=getPrev(CW,di,ei);
  let diffTxt='Eerste meting',diffColor='var(--muted)';
  if(prev){
    const d=cur-prev.vol;
    if(d>0){diffTxt='+'+d+' kg (w'+prev.week+')';diffColor='var(--up)';}
    else if(d<0){diffTxt=d+' kg (w'+prev.week+')';diffColor='var(--dn)';}
    else diffTxt='Gelijk';
  }
  let maxVol=cur;
  for(let w2=1;w2<=WEEKS;w2++){const v=getVol(w2,di,ei);if(v>maxVol)maxVol=v;}
  const pct=maxVol>0?Math.round((cur/maxVol)*100):0;
  const barColor=cur===0?'var(--border)':!prev?'var(--teal)':cur>=prev.vol?'var(--up)':'var(--dn)';
  return `<div class="vol-bar"><div class="vol-top"><span class="vol-num">${cur>0?cur+' kg':'Vul hieronder in'}</span><span class="vol-diff" style="color:${diffColor}">${diffTxt}</span></div><div class="vol-track"><div class="vol-fill" style="width:${pct}%;background:${barColor}"></div></div></div>`;
}

function buildNav(){
  const nav=document.getElementById('weekNav');
  nav.innerHTML='';
  for(let w=1;w<=WEEKS;w++){
    const btn=document.createElement('button');
    btn.className='week-btn'+(w===CW?' active':'');
    let hasData=false;
    SCHEMA[CD].exercises.forEach((ex,ei)=>{
      for(let s=0;s<ex.sets;s++) if(localStorage.getItem(fKey(CLIENT,w,CD,ei,s,'w'))) hasData=true;
    });
    if(hasData&&w!==CW) btn.classList.add('has-data');
    btn.textContent='W'+w;
    btn.onclick=async()=>{CW=w;await sbLoad(CLIENT,w,CD);buildNav();renderWeek();};
    nav.appendChild(btn);
  }
  // Scroll actieve week in beeld
  const activeBtn = nav.querySelector('.week-btn.active');
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

    const isLotte = CLIENT === 'lotte';

        w:localStorage.getItem(fKey(CLIENT,CW,CD,ei,s,'w'))||'',

        rir:localStorage.getItem(fKey(CLIENT,CW,CD,ei,s,'rir'))||''

    }

    let rows=`<div class="set-hdr"><span></span><span class="col-hdr">Set</span><span class="col-hdr">Kg</span><span class="col-hdr">Reps</span><span class="col-hdr">RIR</span></div>`;
    for(let s=0;s<ex.sets;s++){
      rows+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <div style="font-size:10px;color:var(--muted);text-align:center">set ${s+1}</div>
        <input type="text" placeholder="-" value="${vals[s].w}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="w" oninput="liveUpdate(this)" onchange="autoSave(this)">
        <input type="text" placeholder="-" value="${vals[s].r}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="r" oninput="liveUpdate(this)" onchange="autoSave(this)">
        <input type="text" placeholder="?" value="${vals[s].rir}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="rir" onchange="autoSave(this)">
      </div>`;
    }

    const altBadge = hasAlt ? `<span class="ex-client-badge">${isLotte ? 'Lotte' : 'Mandy'}</span>` : '';

    c.innerHTML+=`<div class="exercise${isAltCard?' lotte-alt':''}">
      <div class="ex-top"><div class="ex-name">${displayName}</div>${altBadge}<div class="ex-tag tag-${ex.tag}">${ex.tag}</div></div>
      <div class="ex-badges"><span class="badge badge-reps">${ex.sets}x ${ex.reps}</span><span class="badge badge-rir">${rir}</span></div>
      ${displayNote?`<div class="ex-note${isAltCard?' lotte':''}">${displayNote}</div>`:''}
      ${rows}
      <div id="vol-${CD}-${ei}">${volHTML(CD,ei)}</div>
    </div>`;
  });

  const savedNotes=localStorage.getItem(nKey(CLIENT,CW,CD))||'';
  c.innerHTML+=`<div class="notes-block"><label class="notes-label">Notities</label><textarea placeholder="Hoe voelde het?" data-di="${CD}" onchange="saveNote(this)">${savedNotes}</textarea></div>`;
  c.innerHTML+=`<div id="customExContainer"></div>`;
  c.innerHTML+=`<button class="add-ex-btn" onclick="addCustomExercise()">+ Extra oefening toevoegen</button>`;
  renderCustomExercises();
}

function autoSave(inp){
  localStorage.setItem(fKey(CLIENT,CW,parseInt(inp.dataset.di),parseInt(inp.dataset.ei),parseInt(inp.dataset.s),inp.dataset.t),inp.value);
}
function saveNote(ta){localStorage.setItem(nKey(CLIENT,CW,parseInt(ta.dataset.di)),ta.value);}
function liveUpdate(inp){
  autoSave(inp);
  const di=parseInt(inp.dataset.di),ei=parseInt(inp.dataset.ei);
  const volEl=document.getElementById('vol-'+di+'-'+ei);
  if(volEl) volEl.innerHTML=volHTML(di,ei);
}

async function saveWeek(){
  const msg=document.getElementById('saveMsg');
  msg.style.display='block';
  msg.textContent='Opslaan...';
  document.querySelectorAll('input[data-di]').forEach(i=>autoSave(i));
  document.querySelectorAll('textarea[data-di]').forEach(t=>saveNote(t));
  const promises=[];
  SCHEMA[CD].exercises.forEach((ex,ei)=>{
    for(let s=0;s<ex.sets;s++){
      const w=localStorage.getItem(fKey(CLIENT,CW,CD,ei,s,'w'))||'';
      const r=localStorage.getItem(fKey(CLIENT,CW,CD,ei,s,'r'))||'';
      const rir=localStorage.getItem(fKey(CLIENT,CW,CD,ei,s,'rir'))||'';
      if(w||r||rir) promises.push(sbUpsert({client:CLIENT,week:CW,day:CD,exercise:ei,set_num:s,weight:w,reps:r,rir:rir}));
    }
  });
  const notes=localStorage.getItem(nKey(CLIENT,CW,CD))||'';
  if(notes) promises.push(sbUpsert({client:CLIENT,week:CW,day:CD,exercise:-1,set_num:-1,notes:notes}));
  await Promise.all(promises);
  buildNav();
  msg.textContent='Opgeslagen';
  setTimeout(()=>msg.style.display='none',2500);
}

async function setDay(d){
  CD=d;
  [0,1].forEach(i=>document.getElementById('btn'+i).classList.toggle('active',i===d));
  await sbLoad(CLIENT,d,CW);
  buildNav();
  renderWeek();
  window.scrollTo(0,0);
}

async function switchClient(){
  CLIENT=document.getElementById('clientSelect').value;
  await sbLoad(CLIENT,CW,CD);
  buildNav();
  renderWeek();
}

let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',async e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&CW<WEEKS){CW++;await sbLoad(CLIENT,CW,CD);buildNav();renderWeek();}
    else if(dx>0&&CW>1){CW--;await sbLoad(CLIENT,CW,CD);buildNav();renderWeek();}
  }
},{passive:true});

// Custom exercises
function getCustomExKey(c,w,di){return `custom_ex_${c}_w${w}_d${di}`;}

function loadCustomExercises(){
  const key=getCustomExKey(CLIENT,CW,CD);
  try{return JSON.parse(localStorage.getItem(key)||'[]');}catch(e){return [];}
}

function saveCustomExercises(list){
  localStorage.setItem(getCustomExKey(CLIENT,CW,CD),JSON.stringify(list));
}

function addCustomExercise(){
  const list=loadCustomExercises();
  list.push({name:'',sets:'3',reps:'10-12',w1:'',r1:'',rir1:'',w2:'',r2:'',rir2:'',w3:'',r3:'',rir3:''});
  saveCustomExercises(list);
  renderCustomExercises();
}

function removeCustomExercise(idx){
  const list=loadCustomExercises();
  list.splice(idx,1);
  saveCustomExercises(list);
  renderCustomExercises();
}

function updateCustomField(idx,field,val){
  const list=loadCustomExercises();
  if(list[idx]) list[idx][field]=val;
  saveCustomExercises(list);
}

function renderCustomExercises(){
  const container=document.getElementById('customExContainer');
  if(!container) return;
  const list=loadCustomExercises();
  container.innerHTML='';
  list.forEach((ex,idx)=>{
    const div=document.createElement('div');
    div.className='custom-exercise';
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--gold)">Extra oefening ${idx+1}</div>
        <button class="remove-ex-btn" onclick="removeCustomExercise(${idx})">Verwijderen</button>
      </div>
      <input class="custom-ex-name" type="text" placeholder="Naam oefening..." value="${ex.name||''}" oninput="updateCustomField(${idx},'name',this.value)">
      <div class="custom-ex-meta">
        <div><input type="text" placeholder="3" value="${ex.sets||''}" oninput="updateCustomField(${idx},'sets',this.value)"><span class="custom-ex-label">Sets</span></div>
        <div><input type="text" placeholder="10-12" value="${ex.reps||''}" oninput="updateCustomField(${idx},'reps',this.value)"><span class="custom-ex-label">Reps</span></div>
      </div>
      <div class="set-hdr"><span></span><span class="col-hdr">Set</span><span class="col-hdr">Kg</span><span class="col-hdr">Reps</span><span class="col-hdr">RIR</span></div>
      ${[1,2,3].map(s=>`<div class="set-row">
        <div class="set-num">${s}</div>
        <div style="font-size:10px;color:var(--muted);text-align:center">set ${s}</div>
        <input type="text" placeholder="-" value="${ex['w'+s]||''}" oninput="updateCustomField(${idx},'w${s}',this.value)">
        <input type="text" placeholder="-" value="${ex['r'+s]||''}" oninput="updateCustomField(${idx},'r${s}',this.value)">
        <input type="text" placeholder="?" value="${ex['rir'+s]||''}" oninput="updateCustomField(${idx},'rir${s}',this.value)">
      </div>`).join('')}
    `;
    container.appendChild(div);
  });
}

async function sendMagicLink(){
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){showMsg('Vul een e-mailadres in.','error');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Versturen...';
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.href}});
  if(error) showMsg('Fout: '+error.message,'error');
  else showMsg('Check je e-mail voor de inloglink!','success');
  btn.disabled=false;btn.textContent='Stuur inloglink';
}
function showMsg(msg,type){
  const el=document.getElementById('loginMsg');
  el.textContent=msg;el.className='lcard-msg '+type;
}
function showApp(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('show');
}
async function startApp(){
  await sbLoad(CLIENT,CW,CD);
  buildNav();
  renderWeek();
  document.getElementById('syncStatus').textContent='gesynchroniseerd';
}
async function checkAuth(){
  showApp();
  await startApp();
}
checkAuth();
